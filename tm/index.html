  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #eee;
    }

    :not(:defined) > * {
      display: none;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow-x: hidden;
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      pointer-events: none;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
    }

    #ar-button {
      background-image: url('https://artic17.github.io/ar/ar_view.png');
      background-repeat: no-repeat;
      background-size: 20px 20px;
      background-position: 12px 50%;
      background-color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      top: 82px;
      padding: 0px 11px 0px 40px;
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: #505050;
      height: 36px;
      line-height: 32px;
      border-radius: 6px;
      border: 2px solid #505050;
    }

    #ar-button:active { background-color: #E8EAED; }
    #ar-button:focus { outline: none; }
    #ar-button:focus-visible { outline: 1px solid #4285f4; }

    @keyframes circle {
      from { transform: translateX(-50%) rotate(0deg) translateX(50px) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(360deg) translateX(50px) rotate(-360deg); }
    }

    @keyframes elongate {
      from { transform: translateX(100px); }
      to   { transform: translateX(-100px); }
    }

    model-viewer > #ar-prompt {
      position: absolute;
      left: 50%;
      bottom: 175px;
      animation: elongate 2s infinite ease-in-out alternate;
      display: none;
    }

    model-viewer[ar-status="session-started"] > #ar-prompt { display: block; }
    model-viewer > #ar-prompt > img { animation: circle 4s linear infinite; }

    model-viewer > #ar-failure {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 175px;
      display: none;
    }

    model-viewer[ar-tracking="not-tracking"] > #ar-failure { display: block; }

	#refresh-trait {
	  position: fixed;
	  bottom: 24px;
	  left: 50%;
	  transform: translateX(-50%);
	  white-space: nowrap;
	  z-index: 30;
	  background-image: url('https://artic17.github.io/ar/reroll.png');
	  background-repeat: no-repeat;
	  background-size: 20px 20px;
	  background-position: 12px 50%;
	  background-color: #fff;
	  border: 2px solid #505050;
	  border-radius: 6px;
	  font-family: 'VT323', monospace;
	  font-size: 24px;
	  color: #505050;
	  height: 36px;
	  line-height: 32px;
	  padding: 0px 11px 0px 40px;
	  cursor: pointer;
	}

    #refresh-trait:active { background-color: #E8EAED; }
  </style>

				 'Sandstorm', 'Tornado', 'Hurricane', 'Typhoon', 'Lenticular Cloud', 'Waterspout', 'Sun Dog', 'Dimmerfoehn', 'Aurora Borealis', 'Heatwave', 'Cold Snap', 'Gust', 
				 'Zephyr', 'Gale', 'Squall', 'Monsoon', 'Drizzle', 'Downpour', 'Flash Flood', 'Drought', 'Volcanic Ash', 'Sun Pillar', 'Whiteout', 'Black Ice', 'Sunshower', 'Virga'],

    AMBIENCE:   ['Cafe Chatter', 'Heavy Traffic', 'Concert Roar', 'Dead Silence', 'Library Whisper', 'Office Hum', 'Server Room Drone', 'Air Conditioner Whir', 'Refrigerator Buzz', 
	             'Ceiling Fan Woosh', 'Distant Train', 'Subway Rumble', 'Airplane Cabin', 'Ship Engine', 'Harbor Creak', 'Ocean Waves', 'River Babble', 'Waterfall Roar', 
				 'Rain on Tin Roof', 'Thunder Rumble', 'Wind in Trees', 'Rustling Leaves', 'Crickets Chirping', 'Cicadas Buzzing', 'Frogs Croaking', 'Birds Singing', 'Owl Hooting', 
				 'Wolf Howling', 'City Murmur', 'Crowd Cheering', 'Stadium Roar', 'Playground Laughter', 'Hallway Echo', 'Mall Echo', 'Grocery Store Beeps', 'Hospital Beeps', 
				 'Factory Clang', 'Construction Jackhammer', 'Sirens Wailing', 'Church Bells', 'Clock Ticking', 'Metronome', 'Heartbeat', 'Breathing', 'Footsteps on Gravel', 
				 'Creaking Floorboards', 'Crackling Fire', 'Sizzling Pan', 'Boiling Water', 'Dripping Faucet'],

    SOUND:      ['Dog Bark', 'Police Siren', 'Glass Shattering', 'Car Horn', 'Bicycle Bell', 'Train Whistle', 'Airplane Takeoff', 'Helicopter Rotor', 'Gunshot', 'Explosion', 
	             'Fireworks', 'Thunderclap', 'Doorbell', 'Knock on Door', 'Door Creak', 'Door Slam', 'Key Turning', 'Cash Register Ding', 'Coin Drop', 'Phone Ring', 'Text Notification', 
				 'Keyboard Typing', 'Mouse Click', 'Camera Shutter', 'Zipper', 'Velcro Rip', 'Scissors Cutting', 'Paper Tearing', 'Page Turning', 'Match Striking', 'Lighter Flick', 
				 'Spray Mist', 'Soda Can Opening', 'Bottle Pop', 'Pouring Liquid', 'Drinking Gulp', 'Bite of Apple', 'Chewing Crunch', 'Slurping', 'Burp', 'Sneeze', 'Cough', 'Yawn', 
				 'Sigh', 'Laugh', 'Cry', 'Scream', 'Whistle', 'Clap', 'Snap'],
    };

    // ── Per-card data ──
    const SLIDES = [
      { photo: 'https://artic17.github.io/ar/tm/tm3.webp', title: 'TROTAMUNDO #3', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm8.webp', title: 'TROTAMUNDO #8', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm9.webp', title: 'TROTAMUNDO #9', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm11.webp', title: 'TROTAMUNDO #11', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm16.webp', title: 'TROTAMUNDO #16', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm19.webp', title: 'TROTAMUNDO #19', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm20.webp', title: 'TROTAMUNDO #20', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm21.webp', title: 'TROTAMUNDO #21', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm22.webp', title: 'TROTAMUNDO #22', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },
      { photo: 'https://artic17.github.io/ar/tm/tm26.webp', title: 'TROTAMUNDO #26', backLeft: 'PROOF of LIFE // A.R.', backRight: 'PoLAR-oid' },	  
    ];

    let slideCache = null;
    let slidePicked = null;
    let currentSlide = 0;
    let modelReady = false;
    let originalFrameUrl = null;
    let originalBackUrl = null;
	const photoCache = {};

    // Preload all photos
    SLIDES.forEach(s => { new Image().src = s.photo; });

    // Preload GLB in hidden instance
    const mv0 = document.createElement('model-viewer');
    mv0.src = 'https://artic17.github.io/ar/polar-oid.glb';
    mv0.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(mv0);

	function pickRandomSlide() {
	  // Pick random slide different from current
	  let newIndex;
	  do {
		newIndex = Math.floor(Math.random() * SLIDES.length);
	  } while (newIndex === currentSlide && SLIDES.length > 1);
	  currentSlide = newIndex;

	  // Pick random trait — ensure full string is different from previous
	  const keys = Object.keys(TRAITS);
	  let key, value, candidate;
	  do {
		key = keys[Math.floor(Math.random() * keys.length)];
		const values = TRAITS[key];
		value = values[Math.floor(Math.random() * values.length)];
		candidate = `${key}: ${value.toUpperCase()}`;
	  } while (candidate === slidePicked);
	  slidePicked = candidate;

	  slideCache = null;
	}

    function loadImage(src, crossOrigin = "anonymous") {
      return new Promise((resolve, reject) => {
        const img = new Image();
        if (crossOrigin) img.crossOrigin = crossOrigin;
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function showOverlay() {
      overlay.style.backgroundImage = 'none';
      overlay.style.transition = 'none';
      overlay.classList.remove('hidden');
      overlay.offsetHeight;
      overlay.style.transition = '';
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function applyPBR() {
      modelViewer.exposure = 1.2;
      modelViewer.shadowIntensity = 1;
      modelViewer.shadowSoftness = 0.7;
      const materials = modelViewer.model.materials;
      materials.forEach(mat => {
        mat.pbrMetallicRoughness.setMetallicFactor(0.4);
        mat.pbrMetallicRoughness.setRoughnessFactor(0.3);
      });
    }

    async function applySlide() {
      const index = currentSlide;
      const slide = SLIDES[index];

      // Re-apply from cache instantly
      if (slideCache) {
        const [photoTex, frameTex, backTex] = await Promise.all([
          modelViewer.createTexture(slideCache.photoDataUrl),
          modelViewer.createTexture(slideCache.frameDataUrl),
          modelViewer.createTexture(slideCache.backDataUrl),
        ]);
        const photoMat = modelViewer.model.materials.find(m => m.name === 'PhotoMaterial');
        const frameMat = modelViewer.model.materials.find(m => m.name === 'FrameMaterial');
        const backMat  = modelViewer.model.materials.find(m => m.name === 'BackFrameMaterial');
        if (photoMat) { photoMat.pbrMetallicRoughness.baseColorTexture.setTexture(photoTex); photoMat.pbrMetallicRoughness.setBaseColorFactor([1,1,1,1]); }
        if (frameMat) { frameMat.pbrMetallicRoughness.baseColorTexture.setTexture(frameTex); frameMat.pbrMetallicRoughness.setBaseColorFactor([1,1,1,1]); }
        if (backMat)  { backMat.pbrMetallicRoughness.baseColorTexture.setTexture(backTex);   backMat.pbrMetallicRoughness.setBaseColorFactor([1,1,1,1]); }
        return;
      }

      // First visit — build and cache
      const cache = {};

      const applyPhoto = async () => {
		if (!photoCache[slide.photo]) {
		  const nftImage = await loadImage(slide.photo);
		  const photoCanvas = document.createElement('canvas');
		  photoCanvas.width = 1000;
		  photoCanvas.height = 1000;
		  const pCtx = photoCanvas.getContext('2d');
		  pCtx.scale(1, -1);
		  pCtx.translate(0, -1000);
		  pCtx.drawImage(nftImage, 0, 0, 1000, 1000);
		  photoCache[slide.photo] = photoCanvas.toDataURL();
		}
		cache.photoDataUrl = photoCache[slide.photo];
        const photoTexture = await modelViewer.createTexture(cache.photoDataUrl);
        const photoMat = modelViewer.model.materials.find(mat => mat.name === 'PhotoMaterial');
        if (photoMat) {
          photoMat.pbrMetallicRoughness.baseColorTexture.setTexture(photoTexture);
          photoMat.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
        }
      };

      const applyFrameText = async () => {
        const frameMat = modelViewer.model.materials.find(mat => mat.name === 'FrameMaterial');
        if (!frameMat || !frameMat.pbrMetallicRoughness.baseColorTexture) return;
        const textCanvas = document.createElement('canvas');
        textCanvas.width = 880;
        textCanvas.height = 1070;
        const tCtx = textCanvas.getContext('2d');
        if (!originalFrameUrl) originalFrameUrl = await frameMat.pbrMetallicRoughness.baseColorTexture.texture.source.createThumbnail(880, 1070);
        const originalImg = await loadImage(originalFrameUrl);
        tCtx.drawImage(originalImg, 0, 0, 880, 1070);
        tCtx.save();
        tCtx.scale(1, -1);
        tCtx.translate(0, -1070);
        tCtx.fillStyle = "#1a1a1a";
        tCtx.textAlign = "center";
        tCtx.textBaseline = "middle";
        tCtx.font = "68px 'VT323', monospace";
        tCtx.fillText(slide.title, 440, 920);
        const line2Text = slidePicked;
        tCtx.font = "56px 'VT323', monospace";
        const maxWidth = 800;
        const words = line2Text.split(' ');
        let line = '';
        let y = 980;
        for (const word of words) {
          const test = line ? line + ' ' + word : word;
          if (tCtx.measureText(test).width > maxWidth && line) {
            tCtx.fillText(line, 440, y);
            line = word;
            y += 50;
          } else {
            line = test;
          }
        }
        tCtx.fillText(line, 440, y);
        tCtx.restore();
        cache.frameDataUrl = textCanvas.toDataURL();
        const textTex = await modelViewer.createTexture(cache.frameDataUrl);
        frameMat.pbrMetallicRoughness.baseColorTexture.setTexture(textTex);
        frameMat.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
      };

      const applyBackText = async () => {
        const backMat = modelViewer.model.materials.find(mat => mat.name === 'BackFrameMaterial');
        if (!backMat || !backMat.pbrMetallicRoughness.baseColorTexture) return;
        const backCanvas = document.createElement('canvas');
        backCanvas.width = 880;
        backCanvas.height = 1070;
        const bCtx = backCanvas.getContext('2d');
        if (!originalBackUrl) originalBackUrl = await backMat.pbrMetallicRoughness.baseColorTexture.texture.source.createThumbnail(880, 1070);
        const backImg = await loadImage(originalBackUrl);
        bCtx.drawImage(backImg, 0, 0, 880, 1070);
        bCtx.save();
        bCtx.scale(1, -1);
        bCtx.translate(0, -1070);
        bCtx.fillStyle = "#505050";
        bCtx.textBaseline = "middle";
        bCtx.font = "bold 30px 'Special Elite', cursive";
        const yPosition = 875;
        const sidePadding = 146;
        bCtx.textAlign = "left";
        bCtx.fillText(slide.backLeft, sidePadding, yPosition);
        bCtx.textAlign = "right";
        bCtx.fillText(slide.backRight, 880 - sidePadding, yPosition);
        bCtx.restore();
        cache.backDataUrl = backCanvas.toDataURL();
        const backTex = await modelViewer.createTexture(cache.backDataUrl);
        backMat.pbrMetallicRoughness.baseColorTexture.setTexture(backTex);
        backMat.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
      };

      await Promise.all([applyPhoto(), applyFrameText(), applyBackText()]);
      slideCache = cache;
    }

    document.getElementById('refresh-trait').addEventListener('click', async () => {
      if (!modelReady) return;
      pickRandomSlide();
      showOverlay();
      await applySlide();
      hideOverlay();
    });

    // Initial load — fires once
    modelViewer.addEventListener('load', async () => {
      await document.fonts.load("30px 'Special Elite'");
	  await document.fonts.load("400 30px 'VT323'");
      await document.fonts.ready;

      applyPBR();
	  currentSlide = 0;
	  slidePicked = 'BOOK: 1984'; // ← change this to whatever trait you want on first load
	  await applySlide();
      modelReady = true;
      hideOverlay();
    });

	document.addEventListener('keydown', async (e) => {
	  if (e.key === 'b' || e.key === 'B') {
		const blob = await modelViewer.toBlob({ mimeType: 'image/webp', idealAspect: true });
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a');
		a.href = url;
		a.download = `poster-${currentSlide}.webp`;
		a.click();
		URL.revokeObjectURL(url);
	  }
	});	
	
  </script>
